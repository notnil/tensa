<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1400 680">
  <title id="title">Tensa perception pipeline</title>
  <desc id="desc">AI perception pipeline from ZED stereo frames to localization, ball trajectories, player state, and runtime outputs.</desc>
  <defs>
    <style>
      .bg { fill: #f7faf8; }
      .box { fill: #ffffff; stroke: #cdd8d2; stroke-width: 2; }
      .blue { fill: #eef5ff; stroke: #6d93c8; stroke-width: 2; }
      .green { fill: #f0f7f4; stroke: #79a695; stroke-width: 2; }
      .gold { fill: #fff7e8; stroke: #d6a24f; stroke-width: 2; }
      .title { fill: #1d2b25; font-size: 32px; font-weight: 700; }
      .label { fill: #20332b; font-size: 21px; font-weight: 700; }
      .small { fill: #40584e; font-size: 15px; }
      .tiny { fill: #40584e; font-size: 13px; }
      .arrow { stroke: #37564a; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .dash { stroke: #6d93c8; stroke-width: 3; stroke-dasharray: 9 7; fill: none; marker-end: url(#bluehead); }
      .court { fill: #2f8a50; stroke: #1d5e34; stroke-width: 3; }
      .court-line { stroke: #ffffff; stroke-width: 4; fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="9" refX="10" refY="4.5" orient="auto">
      <path d="M 0 0 L 12 4.5 L 0 9 z" fill="#37564a"/>
    </marker>
    <marker id="bluehead" markerWidth="12" markerHeight="9" refX="10" refY="4.5" orient="auto">
      <path d="M 0 0 L 12 4.5 L 0 9 z" fill="#6d93c8"/>
    </marker>
  </defs>

  <rect class="bg" width="1400" height="680"/>
  <text class="title" x="60" y="70">AI Perception Pipeline</text>
  <text class="small" x="60" y="102">The perception stack converts camera pixels into the court-space signals consumed by navigation, drill logic, targeting, and session review.</text>

  <rect class="blue" x="60" y="165" width="210" height="260" rx="18"/>
  <text class="label" x="92" y="205">ZED stereo frames</text>
  <text class="small" x="92" y="238">front</text>
  <text class="small" x="92" y="266">back</text>
  <text class="small" x="92" y="294">left</text>
  <text class="small" x="92" y="322">right</text>
  <text class="tiny" x="92" y="365">left/right image pairs</text>
  <text class="tiny" x="92" y="390">camera timestamps</text>

  <rect class="box" x="340" y="105" width="245" height="150" rx="18"/>
  <text class="label" x="372" y="145">Court features</text>
  <text class="small" x="372" y="178">lines and keypoints</text>
  <text class="small" x="372" y="206">camera calibration</text>
  <text class="tiny" x="372" y="232">image to ray correspondences</text>

  <rect class="box" x="340" y="285" width="245" height="160" rx="18"/>
  <text class="label" x="372" y="325">Ball detector</text>
  <text class="small" x="372" y="358">YOLO / SAM-assisted labels</text>
  <text class="small" x="372" y="386">left-right matching</text>
  <text class="tiny" x="372" y="414">candidate centers and confidence</text>

  <rect class="box" x="340" y="475" width="245" height="120" rx="18"/>
  <text class="label" x="372" y="515">Player context</text>
  <text class="small" x="372" y="548">position estimates</text>
  <text class="tiny" x="372" y="574">drill and scoring context</text>

  <rect class="green" x="665" y="105" width="260" height="150" rx="18"/>
  <text class="label" x="697" y="145">Localization solver</text>
  <text class="small" x="697" y="178">court model + extrinsics</text>
  <text class="small" x="697" y="206">least-squares pose</text>
  <text class="tiny" x="697" y="232">machine X, Y, yaw</text>

  <rect class="green" x="665" y="305" width="260" height="160" rx="18"/>
  <text class="label" x="697" y="345">Stereo triangulation</text>
  <text class="small" x="697" y="378">epipolar constraints</text>
  <text class="small" x="697" y="406">3D ball points</text>
  <text class="tiny" x="697" y="434">camera to machine to court frame</text>

  <rect class="gold" x="1005" y="215" width="285" height="250" rx="18"/>
  <text class="label" x="1037" y="255">Physics tracker</text>
  <text class="small" x="1037" y="288">associate detections</text>
  <text class="small" x="1037" y="316">estimate velocity</text>
  <text class="small" x="1037" y="344">detect bounces</text>
  <text class="small" x="1037" y="372">refine trajectory fit</text>
  <text class="tiny" x="1037" y="414">outputs: tracks, bounce points,</text>
  <text class="tiny" x="1037" y="436">shot locations, debug overlays</text>

  <rect class="box" x="1005" y="505" width="285" height="100" rx="18"/>
  <text class="label" x="1037" y="545">Runtime outputs</text>
  <text class="small" x="1037" y="577">pose, ball tracks, player state</text>

  <path class="arrow" d="M 270 260 C 300 230, 310 190, 340 180"/>
  <path class="arrow" d="M 270 315 C 300 330, 310 350, 340 365"/>
  <path class="arrow" d="M 270 370 C 300 450, 310 510, 340 535"/>
  <path class="arrow" d="M 585 180 C 620 180, 630 180, 665 180"/>
  <path class="arrow" d="M 585 365 C 620 365, 630 375, 665 385"/>
  <path class="dash" d="M 795 255 C 795 280, 795 285, 795 305"/>
  <path class="arrow" d="M 925 385 C 960 385, 970 360, 1005 345"/>
  <path class="arrow" d="M 925 180 C 965 205, 980 245, 1005 270"/>
  <path class="arrow" d="M 1148 465 L 1148 505"/>

  <g transform="translate(1120 70)">
    <rect class="court" x="0" y="0" width="120" height="90" rx="8"/>
    <line class="court-line" x1="60" y1="0" x2="60" y2="90"/>
    <line class="court-line" x1="0" y1="45" x2="120" y2="45"/>
    <rect class="court-line" x="18" y="12" width="84" height="66"/>
  </g>
</svg>
