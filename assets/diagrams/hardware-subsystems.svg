<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1300 720">
  <title id="title">Tensa hardware and firmware subsystems</title>
  <desc id="desc">Hardware subsystem boundary diagram for compute, cameras, mecanum drive, thrower firmware, power, mechanical packaging, and service/debug access.</desc>
  <defs>
    <style>
      .bg { fill: #f7faf8; }
      .box { fill: #ffffff; stroke: #cdd8d2; stroke-width: 2; }
      .green { fill: #f0f7f4; stroke: #79a695; stroke-width: 2; }
      .blue { fill: #eef5ff; stroke: #6d93c8; stroke-width: 2; }
      .gold { fill: #fff7e8; stroke: #d6a24f; stroke-width: 2; }
      .red { fill: #fff0f0; stroke: #d17878; stroke-width: 2; }
      .title { fill: #1d2b25; font-size: 32px; font-weight: 700; }
      .label { fill: #20332b; font-size: 21px; font-weight: 700; }
      .small { fill: #40584e; font-size: 15px; }
      .tiny { fill: #40584e; font-size: 13px; }
      .arrow { stroke: #37564a; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .power { stroke: #d17878; stroke-width: 4; fill: none; marker-end: url(#redhead); }
      .data { stroke: #6d93c8; stroke-width: 3; fill: none; marker-end: url(#bluehead); }
      .robot { fill: #ffffff; stroke: #263b33; stroke-width: 3; }
      .wheel { fill: #384940; }
      .camera { fill: #1f6f88; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="9" refX="10" refY="4.5" orient="auto">
      <path d="M 0 0 L 12 4.5 L 0 9 z" fill="#37564a"/>
    </marker>
    <marker id="bluehead" markerWidth="12" markerHeight="9" refX="10" refY="4.5" orient="auto">
      <path d="M 0 0 L 12 4.5 L 0 9 z" fill="#6d93c8"/>
    </marker>
    <marker id="redhead" markerWidth="12" markerHeight="9" refX="10" refY="4.5" orient="auto">
      <path d="M 0 0 L 12 4.5 L 0 9 z" fill="#d17878"/>
    </marker>
  </defs>

  <rect class="bg" width="1300" height="720"/>
  <text class="title" x="60" y="70">Hardware and Firmware Boundaries</text>
  <text class="small" x="60" y="102">The robot separates high-level compute from the low-level thrower controller and keeps mechanical packaging serviceable around cameras, wheels, hopper, batteries, and electronics.</text>

  <rect class="green" x="520" y="150" width="270" height="210" rx="18"/>
  <text class="label" x="552" y="190">Jetson compute</text>
  <text class="small" x="552" y="225">Go runtime</text>
  <text class="small" x="552" y="253">GPU perception</text>
  <text class="small" x="552" y="281">debug visualizers</text>
  <text class="small" x="552" y="309">BLE/controller bridge</text>

  <rect class="blue" x="105" y="150" width="270" height="210" rx="18"/>
  <text class="label" x="137" y="190">Camera ring</text>
  <text class="small" x="137" y="225">four ZED viewpoints</text>
  <text class="small" x="137" y="253">stereo ball tracking</text>
  <text class="small" x="137" y="281">court localization</text>
  <text class="small" x="137" y="309">player visibility</text>

  <rect class="gold" x="925" y="150" width="270" height="210" rx="18"/>
  <text class="label" x="957" y="190">ClearCore thrower</text>
  <text class="small" x="957" y="225">top/bottom wheel RPM</text>
  <text class="small" x="957" y="253">angle axis</text>
  <text class="small" x="957" y="281">dispenser</text>
  <text class="small" x="957" y="309">load sensor + faults</text>

  <rect class="box" x="105" y="450" width="270" height="165" rx="18"/>
  <text class="label" x="137" y="490">Mecanum base</text>
  <text class="small" x="137" y="525">four drive modules</text>
  <text class="small" x="137" y="553">strafe + rotate</text>
  <text class="small" x="137" y="581">court-relative motion</text>

  <rect class="red" x="520" y="450" width="270" height="165" rx="18"/>
  <text class="label" x="552" y="490">Power and packaging</text>
  <text class="small" x="552" y="525">battery low in chassis</text>
  <text class="small" x="552" y="553">electronics plate</text>
  <text class="small" x="552" y="581">service access</text>

  <rect class="box" x="925" y="450" width="270" height="165" rx="18"/>
  <text class="label" x="957" y="490">Throw mechanism</text>
  <text class="small" x="957" y="525">dual-wheel launch</text>
  <text class="small" x="957" y="553">hopper and feed path</text>
  <text class="small" x="957" y="581">repeatability testing</text>

  <path class="data" d="M 375 250 C 435 250, 465 250, 520 250"/>
  <path class="arrow" d="M 790 250 C 850 250, 875 250, 925 250"/>
  <path class="arrow" d="M 520 532 C 455 532, 430 532, 375 532"/>
  <path class="arrow" d="M 790 532 C 850 532, 875 532, 925 532"/>
  <path class="power" d="M 655 450 L 655 360"/>
  <path class="power" d="M 520 532 C 455 500, 430 485, 375 488"/>
  <path class="power" d="M 790 532 C 850 500, 875 485, 925 488"/>

  <text class="tiny" x="405" y="237">stereo frames</text>
  <text class="tiny" x="816" y="237">TCP commands</text>
  <text class="tiny" x="410" y="558">drive commands</text>
  <text class="tiny" x="807" y="558">motor control</text>
  <text class="tiny" x="675" y="410">power / mounting</text>
</svg>
