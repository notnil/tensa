<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1300 720">
  <title id="title">Tensa runtime control loop</title>
  <desc id="desc">The Go runtime control loop consumes perception, controller, and drill inputs, maintains court-aware state, and dispatches navigation and thrower commands.</desc>
  <defs>
    <style>
      .bg { fill: #f7faf8; }
      .box { fill: #ffffff; stroke: #cdd8d2; stroke-width: 2; }
      .green { fill: #f0f7f4; stroke: #79a695; stroke-width: 2; }
      .blue { fill: #eef5ff; stroke: #6d93c8; stroke-width: 2; }
      .gold { fill: #fff7e8; stroke: #d6a24f; stroke-width: 2; }
      .purple { fill: #f7efff; stroke: #9b7ac0; stroke-width: 2; }
      .title { fill: #1d2b25; font-size: 32px; font-weight: 700; }
      .label { fill: #20332b; font-size: 21px; font-weight: 700; }
      .small { fill: #40584e; font-size: 15px; }
      .tiny { fill: #40584e; font-size: 13px; }
      .arrow { stroke: #37564a; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .feedback { stroke: #9b7ac0; stroke-width: 3; stroke-dasharray: 9 7; fill: none; marker-end: url(#purplehead); }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="9" refX="10" refY="4.5" orient="auto">
      <path d="M 0 0 L 12 4.5 L 0 9 z" fill="#37564a"/>
    </marker>
    <marker id="purplehead" markerWidth="12" markerHeight="9" refX="10" refY="4.5" orient="auto">
      <path d="M 0 0 L 12 4.5 L 0 9 z" fill="#9b7ac0"/>
    </marker>
  </defs>

  <rect class="bg" width="1300" height="720"/>
  <text class="title" x="60" y="70">Runtime Control Loop</text>
  <text class="small" x="60" y="102">The Go process keeps a coherent court-state model, accepts manual or drill-driven intent, and sends commands to the hardware interfaces that own low-level behavior.</text>

  <rect class="blue" x="60" y="175" width="250" height="300" rx="18"/>
  <text class="label" x="92" y="215">Input streams</text>
  <text class="small" x="92" y="252">machine pose</text>
  <text class="small" x="92" y="282">ball tracks</text>
  <text class="small" x="92" y="312">player positions</text>
  <text class="small" x="92" y="342">controller / BLE</text>
  <text class="small" x="92" y="372">drill selection</text>
  <text class="small" x="92" y="402">hardware status</text>

  <rect class="green" x="395" y="155" width="280" height="340" rx="20"/>
  <text class="label" x="428" y="195">Court-state model</text>
  <rect class="box" x="428" y="225" width="214" height="48" rx="10"/>
  <text class="small" x="454" y="255">robot pose</text>
  <rect class="box" x="428" y="288" width="214" height="48" rx="10"/>
  <text class="small" x="454" y="318">active trajectory</text>
  <rect class="box" x="428" y="351" width="214" height="48" rx="10"/>
  <text class="small" x="454" y="381">player and target zones</text>
  <rect class="box" x="428" y="414" width="214" height="48" rx="10"/>
  <text class="small" x="454" y="444">manual override state</text>

  <rect class="purple" x="760" y="110" width="240" height="145" rx="18"/>
  <text class="label" x="792" y="150">Autonomy layer</text>
  <text class="small" x="792" y="184">drill state machine</text>
  <text class="small" x="792" y="214">shot selection</text>

  <rect class="purple" x="760" y="305" width="240" height="145" rx="18"/>
  <text class="label" x="792" y="345">Navigation</text>
  <text class="small" x="792" y="379">court target</text>
  <text class="small" x="792" y="409">mecanum command</text>

  <rect class="gold" x="760" y="500" width="240" height="145" rx="18"/>
  <text class="label" x="792" y="540">Throw targeting</text>
  <text class="small" x="792" y="574">speed + angle request</text>
  <text class="small" x="792" y="604">load / throw timing</text>

  <rect class="box" x="1080" y="175" width="170" height="300" rx="18"/>
  <text class="label" x="1112" y="215">Hardware</text>
  <text class="small" x="1112" y="252">wheels</text>
  <text class="small" x="1112" y="282">thrower</text>
  <text class="small" x="1112" y="312">ZED cameras</text>
  <text class="small" x="1112" y="342">controller</text>
  <text class="small" x="1112" y="372">Jetson stats</text>
  <text class="tiny" x="1112" y="415">interface-backed mocks</text>
  <text class="tiny" x="1112" y="436">for default tests</text>

  <rect class="box" x="395" y="560" width="280" height="90" rx="18"/>
  <text class="label" x="428" y="600">Telemetry and debug</text>
  <text class="small" x="428" y="630">logs, metrics, snapshots, visualizers</text>

  <path class="arrow" d="M 310 325 C 345 325, 360 325, 395 325"/>
  <path class="arrow" d="M 675 265 C 710 225, 725 190, 760 180"/>
  <path class="arrow" d="M 675 350 C 710 360, 725 370, 760 378"/>
  <path class="arrow" d="M 675 435 C 710 500, 725 550, 760 572"/>
  <path class="arrow" d="M 1000 378 C 1030 378, 1050 360, 1080 340"/>
  <path class="arrow" d="M 1000 572 C 1040 555, 1050 470, 1080 420"/>
  <path class="feedback" d="M 1080 250 C 1040 105, 720 75, 535 155"/>
  <path class="arrow" d="M 535 495 L 535 560"/>
</svg>
